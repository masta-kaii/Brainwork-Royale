<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />

<title>Brainwork Royale — Phase 3</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono','Courier New',monospace;background:#0a0d14;color:#e0e4f0;min-height:100vh;display:grid;place-items:center}
#app{max-width:1024px;width:100%;padding:24px;display:grid;gap:20px}
.header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
.header h1{font-size:20px;font-weight:800;color:#5df2d6;letter-spacing:.04em}
.header span{font-size:11px;color:#5a608a;letter-spacing:.1em}
.main{display:grid;grid-template-columns:1fr 320px;gap:20px}
@media(max-width:780px){.main{grid-template-columns:1fr}}
.canvas-wrap{background:#050810;border:1px solid #2a3052;border-radius:12px;overflow:hidden;aspect-ratio:1;position:relative}
canvas{width:100%;height:100%;display:block}
.hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;pointer-events:none}
.hud-tag{background:rgba(0,0,0,.6);border:1px solid #2a3052;padding:4px 10px;border-radius:6px;font-size:10px;letter-spacing:.12em;color:#8b91b8;backdrop-filter:blur(4px)}
.hud-tag.mint{color:#5df2d6;border-color:rgba(93,242,214,.3)}
.sidebar{display:flex;flex-direction:column;gap:14px}
.panel{background:#0b0d16;border:1px solid #1b203a;border-radius:10px;padding:14px}
.panel-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#5a608a;margin-bottom:10px}
.quiz-q{font-size:13px;font-weight:600;color:#f3f5ff;margin-bottom:8px;line-height:1.4}
.quiz-opts{display:grid;gap:6px}
.quiz-opt{padding:8px 12px;border-radius:6px;cursor:pointer;border:1px solid #2a3052;background:#131626;color:#cdd2ee;font-size:12px;font-family:inherit;text-align:left;transition:border-color 120ms,background 120ms}
.quiz-opt:hover{border-color:#5a608a;background:#1c2138}
.quiz-opt.correct{border-color:#5df2d6;background:rgba(93,242,214,.08);color:#5df2d6}
.quiz-opt.wrong{border-color:#ff4d9d;background:rgba(255,77,157,.08);color:#ff4d9d}
.quiz-feedback{font-size:11px;margin-top:6px;min-height:16px;letter-spacing:.06em}
.stat-row{display:grid;grid-template-columns:1fr 48px;align-items:center;gap:8px;margin:3px 0;font-size:11px}
.stat-name{color:#8b91b8;font-size:10px;letter-spacing:.08em}
.stat-val{color:#f3f5ff;font-weight:600;text-align:right}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid #2a3052;background:#131626;color:#f3f5ff;transition:background 120ms,border-color 120ms}
.btn:hover{background:#1c2138;border-color:#5a608a}
.btn--primary{background:#5df2d6;color:#0a0d14;border-color:#5df2d6;box-shadow:0 4px 20px rgba(93,242,214,.2)}
.btn--primary:hover{background:#7df8e6}
.btn--primary:disabled{opacity:.3;cursor:default;box-shadow:none}
.btn--amber{background:#ffb84d;color:#0a0d14;border-color:#ffb84d}
.btn--amber:hover{background:#ffcc70}
.btn--amber:disabled{opacity:.3}
.btn--sm{padding:6px 12px;font-size:10px}
.tokens-badge{font-size:24px;font-weight:800;color:#ffb84d;letter-spacing:.04em}
.tokens-label{font-size:10px;color:#5a608a;letter-spacing:.1em}
.gen-bar-wrap{height:6px;background:#1c2138;border-radius:999px;overflow:hidden;margin-top:4px}
.gen-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#5df2d6,#ffb84d);transition:width 300ms}
.fitness-chart{width:100%;height:50px;background:rgba(0,0,0,.3);border-radius:6px;margin:6px 0}
.result{text-align:center;padding:16px 0}
.result__status{font-size:20px;font-weight:800;color:#5df2d6;letter-spacing:.02em}
.lb-row{display:grid;grid-template-columns:28px 1fr 60px 70px;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;font-size:11px;margin:2px 0}
.lb-row:hover{background:rgba(93,242,214,.05)}
.lb-row.you{border:1px solid #5df2d6;background:rgba(93,242,214,.08)}
.lb-rank{color:#5a608a;font-weight:700;text-align:center}

.lb-fitness{color:#8b91b8;text-align:right;font-size:10px}
.ghost-legend{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#131626;border:1px solid #5df2d6;border-radius:8px;padding:10px 20px;font-size:12px;color:#5df2d6;animation:toastIn 300ms ease-out;pointer-events:none;z-index:100}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}

<body>
<div id="app">
  <div class="header">

<script>
(function() {
  "use strict";

  // ---- SEEDED PRNG ----
  function createRNG(seed) {
    let s = seed | 0 || 1;
    if (s === 0) s = 1;
    return function next() {
      s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
      return (s >>> 0) / 0xffffffff;
    };
  }

  // ---- MAZE GENERATOR ----
  function generateMaze(cols, rows, seed) {
    var rand = createRNG(seed);
    var grid = [];
    for (var y = 0; y < rows; y++) { var row = []; for (var x = 0; x < cols; x++) row.push(1); grid.push(row); }
    var W = Math.floor((cols-1)/2), H = Math.floor((rows-1)/2);
    var visited = [];
    for (var y = 0; y < H; y++) { var vrow = []; for (var x = 0; x < W; x++) vrow.push(false); visited.push(vrow); }
    function cellTo(cx, cy) { return [cx*2+1, cy*2+1]; }
    function carve(cx, cy) {
      visited[cy][cx] = true;
      var g = cellTo(cx, cy);
      grid[g[1]][g[0]] = 0;
      var dirs = [[0,-1],[1,0],[0,1],[-1,0]];
      for (var i = dirs.length-1; i > 0; i--) { var j = Math.floor(rand()*(i+1)); var t = dirs[i]; dirs[i] = dirs[j]; dirs[j] = t; }
      for (var d = 0; d < dirs.length; d++) {
        var dx = dirs[d][0], dy = dirs[d][1];
        var nx = cx+dx, ny = cy+dy;
        if (nx >= 0 && ny >= 0 && nx < W && ny < H && !visited[ny][nx]) {
          var g1 = cellTo(cx, cy), g2 = cellTo(nx, ny);
          grid[(g1[1]+g2[1])/2][(g1[0]+g2[0])/2] = 0;
          carve(nx, ny);
        }
      }
    }
    carve(0, 0);
    return { grid: grid, cols: cols, rows: rows, start: [1,1], exit: [cols-2, rows-2] };
  }

  // ---- NEURAL NETWORK ----
  var ARCH = { inputs: 8, hidden: 8, outputs: 4 };

  function makeBrain() {
    var inputs = ARCH.inputs, hidden = ARCH.hidden, outputs = ARCH.outputs;
    var w1 = [], b1 = [], w2 = [], b2 = [];
    for (var i = 0; i < hidden; i++) { var r = []; for (var j = 0; j < inputs; j++) r.push(Math.random()*2-1); w1.push(r); b1.push(Math.random()*0.2-0.1); }
    for (var i = 0; i < outputs; i++) { var r = []; for (var j = 0; j < hidden; j++) r.push(Math.random()*2-1); w2.push(r); b2.push(Math.random()*0.2-0.1); }
    return { arch: { inputs: inputs, hidden: hidden, outputs: outputs, activation: 'tanh' }, w1: w1, b1: b1, w2: w2, b2: b2 };
  }

  function cloneBrain(b) {
    return { arch: { inputs: b.arch.inputs, hidden: b.arch.hidden, outputs: b.arch.outputs, activation: b.arch.activation }, w1: b.w1.map(function(r){ return r.slice(); }), b1: b.b1.slice(), w2: b.w2.map(function(r){ return r.slice(); }), b2: b.b2.slice() };
  }

  function forward(b, x) {
    var hidden = b.arch.hidden, outputs = b.arch.outputs, inputs = b.arch.inputs;
    var h = [];
    for (var i = 0; i < hidden; i++) { var s = b.b1[i]; for (var j = 0; j < inputs; j++) s += b.w1[i][j] * x[j]; h.push(Math.tanh(s)); }
    var y = [];
    for (var i = 0; i < outputs; i++) { var s = b.b2[i]; for (var j = 0; j < hidden; j++) s += b.w2[i][j] * h[j]; y.push(Math.tanh(s)); }
    return y;
  }

  function mutate(b, rate, sigma) {
    if (!rate) rate = 0.08; if (!sigma) sigma = 0.3;
    var c = cloneBrain(b);
    function m(v) { return Math.random() < rate ? v + (Math.random()*2-1)*sigma : v; }
    for (var i = 0; i < c.w1.length; i++) for (var j = 0; j < c.w1[i].length; j++) c.w1[i][j] = m(c.w1[i][j]);
    for (var i = 0; i < c.b1.length; i++) c.b1[i] = m(c.b1[i]);
    for (var i = 0; i < c.w2.length; i++) for (var j = 0; j < c.w2[i].length; j++) c.w2[i][j] = m(c.w2[i][j]);
    for (var i = 0; i < c.b2.length; i++) c.b2[i] = m(c.b2[i]);
    return c;
  }

  function brainToJSON(b, meta) {
    return { schema: 'br3', arch: b.arch, weights: { w1: b.w1, b1: b.b1, w2: b.w2, b2: b.b2 }, meta: Object.assign({ ts: Date.now() }, meta) };
  }

  function brainFromJSON(j) {
    return { arch: j.arch, w1: j.weights.w1, b1: j.weights.b1, w2: j.weights.w2, b2: j.weights.b2 };
  }

  // ---- AGENT ----
  function createAgent(maze, brain, color, gid) {
    var sx = maze.start[0], sy = maze.start[1];
    return {
      x: sx+0.5, y: sy+0.5, prevX: sx+0.5, prevY: sy+0.5,
      dir: 0, speed: 0.13, turnRate: 1.2,
      alive: true, reached: false, brain: brain || null,
      memory: [], memorySize: 24, stuckTimer: 0,
      color: color || '#5df2d6', gid: gid || 0, name: ''
    };
  }

  function observe(maze, agent) {
    var grid = maze.grid, cols = maze.cols, rows = maze.rows, exit = maze.exit;
    function wallDist(cx, cy, dx, dy, max) {
      for (var d = 0; d < max; d++) {
        var tx = Math.floor(cx) + dx * d, ty = Math.floor(cy) + dy * d;
        if (tx < 0 || ty < 0 || tx >= cols || ty >= rows) return d / max;
        if (grid[ty][tx] === 1) return d / max;
      }
      return 1;
    }
    var mx = Math.max(cols, rows);
    var dN = wallDist(agent.x, agent.y, 0, -1, mx);
    var dS = wallDist(agent.x, agent.y, 0, 1, mx);
    var dE = wallDist(agent.x, agent.y, 1, 0, mx);
    var dW = wallDist(agent.x, agent.y, -1, 0, mx);
    var dxEx = exit[0] - agent.x, dyEx = exit[1] - agent.y;
    var distExit = Math.hypot(dxEx, dyEx) / Math.hypot(cols, rows);
    var speedNorm = agent.speed * 5;
    var stuckNorm = Math.min(1, agent.stuckTimer / 100);
    var rec = 1;
    var cx = Math.floor(agent.x), cy = Math.floor(agent.y);
    for (var i = agent.memory.length - 1; i >= 0; i--) {
      var m = agent.memory[i];
      if (Math.floor(m[0]) === cx && Math.floor(m[1]) === cy) {
        rec = 1 - (agent.memory.length - i) / agent.memory.length;
        break;
      }
    }
    return [dN, dS, dE, dW, distExit, speedNorm, stuckNorm, rec];
  }

  function tick(maze, agent, rng) {
    if (!agent.alive || agent.reached) return agent;
    var a = { x: agent.x, y: agent.y, prevX: agent.x, prevY: agent.y, dir: agent.dir, speed: agent.speed, turnRate: agent.turnRate, alive: agent.alive, reached: agent.reached, brain: agent.brain, memory: agent.memory.slice(), memorySize: agent.memorySize, stuckTimer: agent.stuckTimer, color: agent.color, gid: agent.gid, name: agent.name };
    a.prevX = a.x; a.prevY = a.y;
    var grid = maze.grid, cols = maze.cols, rows = maze.rows, exit = maze.exit;
    var cx = Math.floor(a.x), cy = Math.floor(a.y);
    if (cx === exit[0] && cy === exit[1]) { a.x = exit[0]+0.5; a.y = exit[1]+0.5; a.reached = true; return a; }
    a.memory.push([a.x, a.y]);
    if (a.memory.length > a.memorySize) a.memory.shift();
    var obs = observe(maze, a);
    var turn = 0, move = 0;
    if (a.brain) {
      var out = forward(a.brain, obs);
      turn = out[1] - out[0];
      move = out[2] - out[3];
      a._lastOutput = out;
    } else {
      turn = (rng() - 0.5) * 2;
      move = rng() * 0.5 + 0.3;
      a._lastOutput = [0,0,0,0];
    }
    a._lastObs = obs;
    a.dir += Math.max(-a.turnRate, Math.min(a.turnRate, turn * a.turnRate * 0.8));
    if (move > 0) { a.x += Math.cos(a.dir) * a.speed * Math.max(0.1, move); a.y += Math.sin(a.dir) * a.speed * Math.max(0.1, move); }
    else { a.stuckTimer++; }
    var ncx = Math.floor(a.x), ncy = Math.floor(a.y);
    if (ncx < 0 || ncy < 0 || ncx >= cols || ncy >= rows || grid[ncy][ncx] === 1) { a.x = a.prevX; a.y = a.prevY; a.stuckTimer++; }
    else { a.stuckTimer = 0; }
    return a;
  }

  // ---- FITNESS + GA ----
  var POP_SIZE = 50, ELITE_COUNT = 5, MAX_TICKS = 1500;

  function evaluateFitness(maze, brain, maxTicks, seedOffset) {
    var rng = createRNG((maze._seed || 0) + (seedOffset || 0));
    var agent = createAgent(maze, brain);
    var ticks = 0, vc = {}, rp = 0;
    while (ticks < maxTicks && !agent.reached) {
      agent = tick(maze, agent, rng);
      ticks++;
      var cx = Math.floor(agent.x), cy = Math.floor(agent.y);
      var k = cx + ',' + cy;
      vc[k] = (vc[k] || 0) + 1;
      if (vc[k] > 3) rp += 0.01;
      if (agent.stuckTimer > 150) break;
    }
    var dist = Math.hypot(maze.exit[0]-agent.x, maze.exit[1]-agent.y);
    var startDist = Math.hypot(maze.exit[0]-maze.start[0], maze.exit[1]-maze.start[1]);
    var progress = Math.max(0, 1 - Math.min(1, dist / startDist));
    var timeBonus = agent.reached ? Math.max(0, (maxTicks - ticks) / maxTicks * 5) : 0;
    var aliveBonus = agent.reached ? 3 : 0;
    return progress + timeBonus + aliveBonus - rp;
  }

  function runGeneration(maze, pop, gen) {
    for (var i = 0; i < pop.length; i++) {
      pop[i].fitness = evaluateFitness(maze, pop[i].brain, MAX_TICKS, gen * POP_SIZE + pop[i].id);
    }
    pop.sort(function(a, b) { return b.fitness - a.fitness; });
    var avg = pop.reduce(function(s, p) { return s + p.fitness; }, 0) / pop.length;
    var elites = pop.slice(0, ELITE_COUNT).map(function(p) { return { id: p.id, brain: cloneBrain(p.brain), fitness: 0 }; });
    var next = elites.slice();
    var parentPool = pop.slice(0, Math.min(8, pop.length));
    for (var i = elites.length; i < POP_SIZE; i++) {
      var parent = parentPool[Math.floor(Math.random() * parentPool.length)].brain;
      next.push({ id: i, brain: mutate(parent), fitness: 0 });
    }
    return { population: next, bestFitness: pop[0].fitness, avgFitness: avg, bestBrain: cloneBrain(pop[0].brain) };
  }

  // ---- QUESTION BANK ----
  var QB = [
    {q:"7 × 8?",o:["54","56","64","48"],c:1},{q:"15% of 200?",o:["25","30","35","40"],c:1},
    {q:"√144?",o:["10","11","12","14"],c:2},{q:"2⁸?",o:["128","256","512","64"],c:1},
    {q:"3³+4²?",o:["43","31","25","37"],c:0},{q:"x+7=15, x=?",o:["6","7","8","9"],c:2},
    {q:"Circle area r=5?",o:["62.8","78.5","31.4","15.7"],c:1},{q:"LCM 6,8?",o:["12","24","48","16"],c:1},
    {q:"99×99?",o:["9701","9801","9901","9999"],c:1},{q:"Triangle ∠s?",o:["90°","180°","270°","360°"],c:1},
    {q:"2¹⁰?",o:["512","1024","2048","256"],c:1},{q:"3x-7=14, x=?",o:["5","6","7","8"],c:2},
    {q:"1/3+1/4?",o:["2/7","7/12","1/7","5/12"],c:1},{q:"√169?",o:["11","12","13","14"],c:2},
    {q:"a=3,b=4,a²+b²=?",o:["25","7","12","49"],c:0},{q:"WW2 end?",o:["1943","1944","1945","1946"],c:2},
    {q:"1st US President?",o:["Jefferson","Adams","Washington","Lincoln"],c:2},{q:"Berlin Wall fell?",o:["1987","1988","1989","1990"],c:2},
    {q:"Colosseum empire?",o:["Greek","Roman","Persian","Ottoman"],c:1},{q:"Penicillin?",o:["Pasteur","Fleming","Koch","Jenner"],c:1},
    {q:"French Revolution?",o:["1776","1789","1799","1804"],c:1},{q:"Art of War?",o:["Confucius","Sun Tzu","Lao Tzu","Mencius"],c:1},
    {q:"1912 ship?",o:["Lusitania","Britannic","Titanic","Olympic"],c:2},{q:"First on moon?",o:["Aldrin","Armstrong","Gagarin","Glenn"],c:1},
    {q:"Statue of Liberty?",o:["UK","Spain","France","Italy"],c:2},{q:"Magna Carta?",o:["1066","1215","1492","1688"],c:1},
    {q:"Capital France?",o:["London","Berlin","Paris","Madrid"],c:2},{q:"Largest continent?",o:["Africa","Asia","Europe","N.America"],c:1},
    {q:"Longest river?",o:["Amazon","Yangtze","Nile","Mississippi"],c:2},{q:"Continents?",o:["5","6","7","8"],c:2},
    {q:"Capital Japan?",o:["Seoul","Beijing","Tokyo","Bangkok"],c:2},{q:"Most populous?",o:["USA","India","China","Indonesia"],c:1},
    {q:"Everest range?",o:["Andes","Alps","Himalayas","Rockies"],c:2},{q:"Largest ocean?",o:["Atlantic","Indian","Arctic","Pacific"],c:3},
    {q:"Capital Australia?",o:["Sydney","Melbourne","Canberra","Perth"],c:2},{q:"Sahara continent?",o:["Asia","Africa","Australia","S.America"],c:1},
    {q:"H₂O is?",o:["Oxygen","Hydrogen","Water","Helium"],c:2},{q:"Closest to Sun?",o:["Venus","Mercury","Earth","Mars"],c:1},
    {q:"Plants absorb?",o:["Oxygen","Nitrogen","CO₂","Hydrogen"],c:2},{q:"Light speed?",o:["100k","200k","300k","400k"],c:2},
    {q:"Bones in human?",o:["186","206","226","256"],c:1},{q:"DNA?",o:["Deoxyribonucleic Acid","Dinitrogen Acid","Double Nucleic Acid","Deoxyribose Nucleic"],c:0},
    {q:"Cell powerhouse?",o:["Nucleus","Ribosome","Mitochondria","Membrane"],c:2},{q:"Carbon atomic#?",o:["4","6","8","12"],c:1},
    {q:"Ground force?",o:["Magnetism","Friction","Gravity","Inertia"],c:2},{q:"Periodic table?",o:["92","108","118","136"],c:2}
  ];

  function pickQuestions(n) {
    var p = QB.slice();
    for (var i = p.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t = p[i]; p[i] = p[j]; p[j] = t; }
    return p.slice(0, n);
  }

  // ---- DAILY MAZE ----
  function dailySeed() {
    var d = new Date();
    return d.getUTCFullYear() * 10000 + (d.getUTCMonth()+1) * 100 + d.getUTCDate();
  }
  function dailyMaze() { var s = dailySeed(); var m = generateMaze(21, 21, s); m._seed = s; return m; }

  // ---- PERSISTENCE ----
  function saveRun(dateKey, runData) {
    var key = 'br3_runs_' + dateKey;
    var runs = JSON.parse(localStorage.getItem(key) || '[]');
    runs.push(Object.assign({ submittedAt: Date.now() }, runData));
    localStorage.setItem(key, JSON.stringify(runs));
  }
  function loadRuns(dateKey) { return JSON.parse(localStorage.getItem('br3_runs_' + dateKey) || '[]'); }
  function saveBrain(brain) {
    if (!brain) return;
    localStorage.setItem('br3_brain', JSON.stringify(brainToJSON(brain, { gen: GS.totalGens, fitness: GS.bestFitness })));
  }
  function loadBrain() { var d = localStorage.getItem('br3_brain'); return d ? brainFromJSON(JSON.parse(d)) : null; }

  // ---- FAKE GHOSTS ----
  var GHOST_NAMES = ['Berok','Kestrel','Mirage','Tango','Sparx','Nova','Drift','Raze','Flux','Pixel','Glitch','Aegis','Umbra','Zephyr','Cinder'];
  var GHOST_COLORS = ['#5df2d6','#ff4d9d','#ffb84d','#7be38a','#5dd3f2','#a973ff','#ff8b45','#ff5577','#fff066','#45d3ff','#ff6bd6','#8be35d','#f2a95d','#6ba3ff','#ff9e4d','#d65dff'];

  function generateFakeGhosts(maze, count) {
    var ghosts = [];
    for (var i = 0; i < count; i++) {
      var rng = createRNG(maze._seed + i * 1000 + 1);
      var brain = makeBrain();
      for (var j = 0; j < ARCH.hidden; j++) brain.w2[2][j] += 0.3;
      var agent = createAgent(maze, brain);
      var ticks = 0;
      while (ticks < MAX_TICKS && !agent.reached) {
        agent = tick(maze, agent, rng);
        ticks++;
        if (agent.stuckTimer > 300) break;
      }
      ghosts.push({
        id: 'ghost_' + i,
        name: GHOST_NAMES[i % GHOST_NAMES.length],
        brain: brain, ticks: ticks,
        fitness: evaluateFitness(maze, brain, MAX_TICKS, i * 10),
        submittedAt: Date.now() - Math.random() * 3600000
      });
    }
    return ghosts;
  }

  // ---- CANVAS ----
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');

  function resizeCanvas() {
    var wrap = document.getElementById('canvasWrap');
    var r = wrap.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = r.width * dpr;
    canvas.height = r.height * dpr;
    canvas.style.width = r.width + 'px';
    canvas.style.height = r.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function render(maze, agents) {
    var grid = maze.grid, cols = maze.cols, rows = maze.rows, exit = maze.exit;
    var w = canvas.clientWidth, h = canvas.clientHeight;
    var cw = w / cols, ch = h / rows;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#050810';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#1c2138';
    for (var y = 0; y < rows; y++) for (var x = 0; x < cols; x++) if (grid[y][x] === 1) ctx.fillRect(x*cw+1, y*ch+1, cw-2, ch-2);
    ctx.fillStyle = '#5df2d6';
    ctx.globalAlpha = 0.5 + Math.sin(performance.now() * 0.005) * 0.3;
    ctx.fillRect(exit[0]*cw+2, exit[1]*ch+2, cw-4, ch-4);
    ctx.globalAlpha = 1;
    for (var i = 0; i < agents.length; i++) {
      var a = agents[i];
      if (!a.alive && !a.reached) continue;
      var px = a.x * cw, py = a.y * ch, sz = cw * 0.35;
      ctx.save(); ctx.translate(px, py); ctx.rotate(a.dir);
      ctx.fillStyle = a.color || '#5df2d6';
      ctx.beginPath();
      ctx.moveTo(sz, 0); ctx.lineTo(-sz*0.6, -sz*0.5); ctx.lineTo(-sz*0.6, sz*0.5);
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
  }

  // ---- GAME STATE ----
  var GS = { tokens: 3, totalGens: 0, bestFitness: 0, bestBrain: null, population: null, fitnessHistory: [], todayRun: null, ghostRuns: [], personalBest: 0 };
  var RS = { status: 'idle', speed: 2, maze: null, agents: [], tickMap: null, tickCount: 0 };

  function initPopulation() {
    var pop = [];
    for (var i = 0; i < POP_SIZE; i++) pop.push({ id: i, brain: makeBrain(), fitness: 0 });
    GS.population = pop;
    GS.totalGens = 0; GS.fitnessHistory = []; GS.bestFitness = 0;
    var saved = loadBrain();
    GS.bestBrain = saved || null;
  }

  // ---- SETUP ----
  var todayKey = String(dailySeed());
  var maze = dailyMaze();
  RS.maze = maze;
  initPopulation();

  document.getElementById('todayDate').textContent = 'MAZE #' + todayKey;
  document.getElementById('mazeInfo').textContent = 'Seed: ' + todayKey + ' \u00b7 21\u00d721 grid';

  var allRuns = loadRuns(todayKey);
  var fakeGhosts = generateFakeGhosts(maze, 14);
  GS.ghostRuns = allRuns.concat(fakeGhosts).sort(function(a, b) { return b.fitness - a.fitness; }).slice(0, 15);

  GS.todayRun = null;
  for (var r = 0; r < allRuns.length; r++) { if (allRuns[r].isPlayer) { GS.todayRun = allRuns[r]; break; } }
  if (GS.todayRun) {
    document.getElementById('runOfficialBtn').disabled = true;
    document.getElementById('runOfficialBtn').textContent = '\u2713 RUN SUBMITTED';
    document.getElementById('runStatus').textContent = GS.todayRun.ticks + ' ticks \u00b7 #?';
  }

  // ---- LEADERBOARD ----
  function updateLeaderboard() {
    var el = document.getElementById('leaderboard');
    var runs = GS.ghostRuns.slice().sort(function(a, b) { return b.fitness - a.fitness; });
    if (GS.todayRun) runs.unshift(Object.assign({ name: 'YOU', isPlayer: true }, GS.todayRun));
    if (runs.length === 0) { el.innerHTML = '<div style="font-size:10px;color:#5a608a;text-align:center;padding:12px">No runs yet. Be the first!</div>'; return; }
    var html = '';
    for (var i = 0; i < runs.length; i++) {
      var r = runs[i];
      var time = (r.ticks / 30).toFixed(1) + 's';
      var youClass = r.isPlayer ? ' you' : '';
      var color = r.isPlayer ? '#5df2d6' : (GHOST_COLORS[i % 16] || '#8b91b8');
      html += '<div class="lb-row' + youClass + '"><span class="lb-rank" style="color:' + color + '">#' + (i+1) + '</span><span class="lb-name">' + (r.isPlayer ? '\u2605 ' : '') + (r.name || 'Ghost') + '</span><span class="lb-time">' + time + '</span><span class="lb-fitness">' + (r.fitness || 0).toFixed(2) + '</span></div>';
    }
    el.innerHTML = html;
  }

  // ---- OFFICIAL RUN ----
  function submitOfficialRun() {
    if (!GS.bestBrain) { toast('Train your brain first!'); return; }
    if (GS.todayRun) { toast('Already submitted today'); return; }
    var rng = createRNG(maze._seed + 9999);
    var agent = createAgent(maze, GS.bestBrain, '#5df2d6', 0);
    agent.name = 'YOU';
    var ticks = 0;
    while (ticks < MAX_TICKS && !agent.reached) { agent = tick(maze, agent, rng); ticks++; }
    var fitness = evaluateFitness(maze, GS.bestBrain, MAX_TICKS, 9999);
    GS.todayRun = { id: 'player', name: 'YOU', brain: GS.bestBrain, ticks: ticks, fitness: fitness, isPlayer: true, submittedAt: Date.now() };
    saveRun(todayKey, GS.todayRun);
    document.getElementById('runOfficialBtn').disabled = true;
    document.getElementById('runOfficialBtn').textContent = '\u2713 SUBMITTED';
    document.getElementById('runStatus').textContent = ticks + ' ticks \u00b7 ' + (ticks/30).toFixed(1) + 's';
    startGhostRace(GS.todayRun);
    updateLeaderboard();
    toast('Run submitted! ' + (ticks/30).toFixed(1) + 's');
  }

  // ---- GHOST RACE ----
  function startGhostRace(playerRun) {
    var agents = [];
    var pa = createAgent(maze, playerRun.brain, GHOST_COLORS[0], 0); pa.name = 'YOU';
    agents.push(pa);
    var ghosts = (GS.ghostRuns || []).slice(0, 15);
    for (var i = 0; i < ghosts.length; i++) {
      var ga = createAgent(maze, ghosts[i].brain, GHOST_COLORS[(i+1)%16], i+1);
      ga.name = (ghosts[i].name || '?').slice(0, 6);
      agents.push(ga);
    }
    RS.agents = agents;
    RS.tickMap = [];
    for (var i = 0; i < agents.length; i++) RS.tickMap.push(createRNG(maze._seed + 1000 + i));
    RS.status = 'racing'; RS.speed = 3; RS.tickCount = 0;
    document.getElementById('hudState').textContent = 'RACING';
    document.getElementById('hudInfo').textContent = agents.length + ' agents \u00b7 0 ticks';
  }

  // ---- TRAINING ----
  var trainingActive = false;
  function trainGenerations(count) {
    if (trainingActive) return;
    trainingActive = true;
    var remaining = count;
    function step() {
      if (remaining <= 0 || GS.tokens <= 0) { trainingActive = false; updateUI(); document.getElementById('trainProgress').textContent = 'ready'; return; }
      remaining--; GS.tokens--;
      document.getElementById('trainProgress').textContent = 'training ' + (count - remaining) + '/' + count + '...';
      var result = runGeneration(RS.maze, GS.population, GS.totalGens);
      GS.population = result.population;
      GS.bestFitness = result.bestFitness;
      GS.totalGens++;
      GS.fitnessHistory.push(result.bestFitness);
      if (GS.fitnessHistory.length > 100) GS.fitnessHistory.shift();
      if (!GS.bestBrain || result.bestFitness > GS.personalBest) {
        GS.bestBrain = cloneBrain(result.bestBrain);
        GS.personalBest = result.bestFitness;
        saveBrain(GS.bestBrain);
      }
      updateUI(); drawFitnessChart();
      setTimeout(step, 30);
    }
    setTimeout(step, 0);
  }

  // ---- QUIZ ----
  var currentQuiz = [], quizIndex = 0, quizScore = 0;
  function resetQuiz() { quizIndex = 0; quizScore = 0; currentQuiz = pickQuestions(5); renderQuiz(); }
  function renderQuiz() {
    var el = document.getElementById('quizContent');
    if (quizIndex >= currentQuiz.length) { el.innerHTML = '<div class="quiz-feedback" style="color:#5df2d6">+' + quizScore + ' tokens!</div><button class="btn btn--sm" style="margin-top:8px" id="newQuizBtn">New quiz</button>'; document.getElementById('newQuizBtn').addEventListener('click', newQuiz); return; }
    var q = currentQuiz[quizIndex];
    var html = '<div class="quiz-q">' + q.q + '</div><div class="quiz-opts">';
    for (var i = 0; i < q.o.length; i++) html += '<button class="quiz-opt" data-idx="' + i + '">' + String.fromCharCode(65+i) + ') ' + q.o[i] + '</button>';
    html += '</div><div class="quiz-feedback" id="qf"></div>';
    el.innerHTML = html;
    var buttons = el.querySelectorAll('.quiz-opt');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].addEventListener('click', function() {
        var idx = parseInt(this.dataset.idx);
        var correct = idx === currentQuiz[quizIndex].c;
        var allBtns = el.querySelectorAll('.quiz-opt');
        for (var j = 0; j < allBtns.length; j++) {
          allBtns[j].disabled = true;
          if (j === currentQuiz[quizIndex].c) allBtns[j].classList.add('correct');
          else if (j === idx && !correct) allBtns[j].classList.add('wrong');
        }
        if (correct) { quizScore++; GS.tokens++; }
        var fb = document.getElementById('qf');
        fb.textContent = correct ? 'Correct! +1 token' : 'Incorrect.';
        fb.style.color = correct ? '#5df2d6' : '#ff4d9d';
        setTimeout(function() { quizIndex++; renderQuiz(); updateUI(); }, 800);
      });
    }
  }
  function newQuiz() { quizIndex = 0; quizScore = 0; currentQuiz = pickQuestions(5); renderQuiz(); }

  // ---- FITNESS CHART ----
  function drawFitnessChart() {
    var c = document.getElementById('fitnessChart');
    var dpr = window.devicePixelRatio || 1;
    var w = c.clientWidth, h = c.clientHeight;
    if (c.width !== w*dpr) { c.width = w*dpr; c.height = h*dpr; }
    var c2 = c.getContext('2d');
    c2.setTransform(dpr, 0, 0, dpr, 0, 0);
    c2.clearRect(0, 0, w, h);
    var hist = GS.fitnessHistory;
    if (hist.length < 2) return;
    var lo = Math.min.apply(null, hist.concat([0]));
    var hi = Math.max.apply(null, hist.concat([lo + 0.1]));
    var span = hi - lo;
    c2.fillStyle = 'rgba(93,242,214,0.1)';
    c2.beginPath();
    for (var i = 0; i < hist.length; i++) {
      var x = (i / Math.max(1, hist.length-1)) * w;
      var y = h - ((hist[i] - lo) / span) * h;
      if (i === 0) c2.moveTo(x, y); else c2.lineTo(x, y);
    }
    c2.lineTo(w, h); c2.lineTo(0, h); c2.closePath(); c2.fill();
    c2.strokeStyle = '#5df2d6'; c2.lineWidth = 1.5;
    c2.beginPath();
    for (var i = 0; i < hist.length; i++) {
      var x = (i / Math.max(1, hist.length-1)) * w;
      var y = h - ((hist[i] - lo) / span) * h;
      if (i === 0) c2.moveTo(x, y); else c2.lineTo(x, y);
    }
    c2.stroke();
  }

  // ---- UI ----
  function updateUI() {
    document.getElementById('tokenCount').textContent = GS.tokens;
    document.getElementById('lineageInfo').textContent = 'gen ' + GS.totalGens + ' \u00b7 fit ' + GS.bestFitness.toFixed(2);
    document.getElementById('genBar').style.width = Math.min(100, GS.totalGens * 2) + '%';
    document.getElementById('brainInfo').innerHTML = '8\u21928\u21924 \u00b7 ~100w<br/>gen ' + GS.totalGens + ' \u00b7 fit ' + GS.bestFitness.toFixed(2);
    document.getElementById('runOfficialBtn').disabled = !GS.bestBrain || !!GS.todayRun;
    document.getElementById('replayBestBtn').disabled = !GS.bestBrain;
    if (GS.todayRun) { document.getElementById('runOfficialBtn').textContent = '\u2713 SUBMITTED'; document.getElementById('runOfficialBtn').disabled = true; }
  }

  function toast(msg) { var t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(function() { t.remove(); }, 2000); }

  // ---- EVENT HANDLERS ----
  document.getElementById('trainBtn').addEventListener('click', function() { if (GS.tokens <= 0) { toast('No tokens! Do a quiz.'); return; } trainGenerations(1); });
  document.getElementById('train10Btn').addEventListener('click', function() { if (GS.tokens <= 0) { toast('No tokens!'); return; } trainGenerations(10); });
  document.getElementById('trainAllBtn').addEventListener('click', function() { if (GS.tokens <= 0) { toast('No tokens!'); return; } trainGenerations(GS.tokens); });
  document.getElementById('runOfficialBtn').addEventListener('click', submitOfficialRun);
  document.getElementById('replayBestBtn').addEventListener('click', function() {
    if (!GS.bestBrain) return;
    var a = createAgent(RS.maze, GS.bestBrain, '#5df2d6', 0); a.name = 'YOU';
    RS.agents = [a]; RS.tickMap = [createRNG(maze._seed + 100)]; RS.status = 'replay'; RS.speed = 3; RS.tickCount = 0;
    document.getElementById('hudState').textContent = 'REPLAY';
    document.getElementById('hudInfo').textContent = '1 agent';
    toast('Replaying best brain');
  });
  document.getElementById('shareBtn').addEventListener('click', function() {
    var t = '\uD83E\uDDE0 Daily maze #' + todayKey + ' \u00b7 My brain: gen ' + GS.totalGens + ', fit ' + GS.bestFitness.toFixed(2) + ' \u2014 Brainwork Royale';
    navigator.clipboard.writeText(t).then(function() { toast('Copied!'); });
  });

  // ---- GAME LOOP ----
  var TICK_RATE = 30, TICK_MS = 1000 / TICK_RATE;
  var lastTime = 0, tickAcc = 0;

  function gameLoop(ts) {
    requestAnimationFrame(gameLoop);
    if (RS.status === 'racing' || RS.status === 'replay') {
      if (lastTime === 0) lastTime = ts;
      var elapsed = ts - lastTime; lastTime = ts;
      tickAcc += elapsed * RS.speed;
      var anyAlive = RS.agents.some(function(a) { return a.alive && !a.reached; });
      while (tickAcc >= TICK_MS && anyAlive) {
        tickAcc -= TICK_MS;
        anyAlive = false;
        for (var i = 0; i < RS.agents.length; i++) {
          var a = RS.agents[i];
          if (!a.alive || a.reached) continue;
          RS.agents[i] = tick(RS.maze, a, RS.tickMap[i]);
          if (RS.agents[i].reached) document.getElementById('hudState').classList.add('mint');
          if (RS.agents[i].alive && !RS.agents[i].reached) anyAlive = true;
        }
        RS.tickCount++;
      }
      if (!anyAlive) { RS.status = 'done'; toast('Race complete!'); }
      var alive = RS.agents.filter(function(a) { return a.alive && !a.reached; }).length;
      var total = RS.agents.filter(function(a) { return a.alive || a.reached; }).length;
      document.getElementById('hudInfo').textContent = total + ' agents \u00b7 ' + RS.tickCount + ' ticks';
    } else { lastTime = 0; tickAcc = 0; }
    if (RS.maze && RS.agents.length > 0) render(RS.maze, RS.agents);
    else if (RS.maze) render(RS.maze, [createAgent(RS.maze, GS.bestBrain)]);
  }

  // ---- INIT ----
  resetQuiz();
  updateLeaderboard();
  updateUI();
  requestAnimationFrame(gameLoop);
})();
</script>
