<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"/><title>PEP Load Test</title>
<style>body{margin:20px;background:#111;color:#fff;font:13px monospace;line-height:1.8}</style>
</head>
<body>
<h2>PEP-Smol Load Test</h2>
<div id="log"></div>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const log = (msg, color) => {
  const d = document.getElementById('log');
  d.innerHTML += `<div style="color:${color||'#aaa'}">${msg}</div>`;
};

log('Starting tests...', '#5df2d6');

// Test 1: Draco GLB
log('Test 1: Loading Draco GLB...', '#ffb84d');
const draco = new DRACOLoader();
draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
const loader1 = new GLTFLoader();
loader1.setDRACOLoader(draco);
try {
  const gltf1 = await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error('TIMEOUT 15s')), 15000);
    loader1.load('assets/pep-smol-draco.glb',
      (gltf) => { clearTimeout(timeout); resolve(gltf); },
      (xhr) => {
        if (xhr.total) log(`Draco: ${Math.round(xhr.loaded/xhr.total*100)}% (${Math.round(xhr.loaded/1024)}KB / ${Math.round(xhr.total/1024)}KB)`);
        else log(`Draco: ${Math.round(xhr.loaded/1024)}KB...`);
      },
      (err) => { clearTimeout(timeout); reject(err); }
    );
  });
  log('✓ Draco GLB loaded! ' + gltf1.animations.length + ' animations', '#5df2d6');
} catch(e) {
  log('✗ Draco failed: ' + (e?.message || e?.statusText || e), '#ff4d9d');
}

// Test 2: Uncompressed GLTF (no Draco)
log('Test 2: Loading uncompressed GLTF...', '#ffb84d');
const loader2 = new GLTFLoader();
try {
  const gltf2 = await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error('TIMEOUT 20s')), 20000);
    loader2.load('assets/pep-smol.gltf',
      (gltf) => { clearTimeout(timeout); resolve(gltf); },
      (xhr) => {
        if (xhr.total) log(`GLTF: ${Math.round(xhr.loaded/xhr.total*100)}% (${Math.round(xhr.loaded/1024)}KB / ${Math.round(xhr.total/1024)}KB)`);
        else log(`GLTF: ${Math.round(xhr.loaded/1024)}KB downloaded...`);
      },
      (err) => { clearTimeout(timeout); reject(err); }
    );
  });
  log('✓ Uncompressed GLTF loaded! ' + gltf2.animations.length + ' animations', '#5df2d6');
} catch(e) {
  log('✗ GLTF failed: ' + (e?.message || e?.statusText || e), '#ff4d9d');
}

log('Tests complete.', '#5df2d6');
</script>
</body>
</html>
