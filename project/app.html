        <div style="font-size:11px; letter-spacing:0.22em; color:#5df2d6">BRAINWORK · ROYALE</div>
        <div id="boot-msg" style="font-size:11px; letter-spacing:0.16em; color:#8b91b8; margin-top:14px">BOOTING WARDEN'S DECK…</div>
        <div id="boot-status" style="font-size:10px; letter-spacing:0.12em; color:#5a608a; margin-top:8px; line-height:1.6; min-height:32px"></div>
        <div style="width: 240px; height: 3px; background:#1c2138; border-radius:999px; margin: 12px auto 0; overflow:hidden">
          <div id="boot-bar" style="width:0%; height:100%; background:#5df2d6; box-shadow: 0 0 12px rgba(93,242,214,0.5); transition: width 240ms"></div>
        </div>
        <div id="boot-timer" style="font-size:10px; letter-spacing:0.1em; color:#383d63; margin-top:8px"></div>
        <div id="boot-error" style="display:none; margin-top:14px; padding:10px 14px; background:rgba(255,77,157,0.1); border:1px solid rgba(255,77,157,0.3); border-radius:8px; font-size:10px; color:#ff4d9d; line-height:1.5; word-break:break-all"></div>
        <button id="boot-retry" style="display:none; margin-top:14px; padding:8px 18px; background:#5df2d6; color:#07080d; border:none; border-radius:8px; font-family:inherit; font-size:11px; font-weight:700; letter-spacing:0.12em; cursor:pointer; text-transform:uppercase" onclick="location.reload()">Retry ↻</button>
      </div>
    </div>
  </div>

  <!-- ===== GLOBAL ERROR BOUNDARY (before any other script) ===== -->
  <script>
    const BOOT_START = Date.now();
    const bootMsg = document.getElementById('boot-msg');
    const bootStatus = document.getElementById('boot-status');
    const bootBar = document.getElementById('boot-bar');
    const bootTimer = document.getElementById('boot-timer');
    const bootError = document.getElementById('boot-error');
    const bootRetry = document.getElementById('boot-retry');

    // Update the elapsed timer every second
    const timerTick = setInterval(() => {
      const s = Math.floor((Date.now() - BOOT_START) / 1000);
      if (bootTimer) bootTimer.textContent = `ELAPSED · ${s}s`;
    }, 1000);

    // Exposed so app.jsx boot() can call it
    window.setBootStatus = function(msg, isError) {
      if (bootMsg) bootMsg.textContent = msg || bootMsg.textContent;
      if (bootStatus) {
        bootStatus.textContent = (bootStatus.textContent
          ? bootStatus.textContent + '\n'
          : '') + `▸ ${msg}`;
      }
      if (isError) {
        window._bootFailed = true;
        if (bootError) { bootError.style.display = 'block'; bootError.textContent = msg; }
        if (bootRetry) bootRetry.style.display = 'inline-block';
        if (bootBar) bootBar.style.background = '#ff4d9d';
      }
    };

    // Set progress bar fill
    window.setBootProgress = function(pct) {
      if (bootBar) bootBar.style.width = Math.min(100, Math.max(0, pct)) + '%';
    };

    // Global error handlers — surface errors to the boot screen
    window.addEventListener('error', function(e) {
      const msg = e.filename
        ? `${e.message || 'script error'} @ ${e.filename}:${e.lineno}`
        : (e.message || 'unknown error');
      window.setBootStatus(msg, true);
      console.error('[boot]', msg, e.error || e);
    });

    window.addEventListener('unhandledrejection', function(e) {
      const msg = e.reason?.message || String(e.reason || 'unhandled rejection');
      window.setBootStatus(msg, true);
      console.error('[boot] unhandled rejection:', e.reason);
    });
  </script>

  <!-- Three.js (ESM) + GLTFLoader + OrbitControls + PEP-Smol preload -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    window.THREE = THREE;
    window.GLTFLoader = GLTFLoader;
    window.DRACOLoader = DRACOLoader;
    window.OrbitControls = OrbitControls;

    // Pre-load PEP-Smol once for the whole app — try Draco-compressed GLB first,
    // fall back to uncompressed GLTF. Draco is 39% smaller (5.4 vs 8.8 MB).
    window.setBootProgress(2);
    const pePUrl = 'assets/pep-smol-draco.glb';
    const pePFallback = 'assets/pep-smol.gltf';

    async function loadPep() {
      const loader = new GLTFLoader();

      // Draco decoder — required for compressed GLB
      try {
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
        loader.setDRACOLoader(dracoLoader);
        window.setBootStatus("DRACO DECODER READY");
      } catch (e) {
        console.warn("Draco loader unavailable, will try uncompressed", e);
      }

      const doLoad = (url, isFallback) => new Promise((resolve, reject) => {
        loader.load(url,
          (gltf) => resolve(gltf),
          (xhr) => {
            const pct = xhr.total ? Math.round(xhr.loaded / xhr.total * 100) : Math.min(99, Math.round(xhr.loaded / 1.5e5));
            window.setBootStatus(`DECRYPTING RIG · ${pct}%${isFallback ? ' (uncompressed)' : ''}`);
            window.setBootProgress(2 + Math.round(pct * 0.26));
          },
          (err) => reject(err)
        );
      });

      try {
        return await doLoad(pePUrl, false);
      } catch (e) {
        console.warn("Draco GLB load failed, trying uncompressed", e);
        return await doLoad(pePFallback, true);
      }
    }

    try {
      const gltf = await loadPep();
      window.PEP_BASE = gltf;
      window.PEP_READY = true;
      window.setBootStatus("PEP-SMOL RIG READY");
      window.setBootProgress(30);
    } catch (e) {
      console.error('PEP load failed', e);
      window.PEP_READY = true; // fail open; scene falls back to stickmen
      window.PEP_FAILED = true;
      window.setBootStatus("PEP-SMOL FAILED · USING FALLBACK RENDERER", true);
    }
    window.dispatchEvent(new Event('app-ready'));
  </script>

  <!-- Firebase SDK (modular v11, ESM). Loads before JSX so window.firebase is ready. -->

  <!-- Rapier3D physics (wasm-bundled compat build). Init is async; we
       expose RAPIER on window after init and dispatch 'rapier-ready' so
       any script that needs physics can wait for it. -->
  <script type="module">
    // Build the URL at runtime via concat. Otherwise the literal
    // "name@version" pattern (e.g. "compat@0.12.0") in the HTML source gets
    // mangled to "[email protected]" by Cloudflare email-obfuscation,
    // privacy browser extensions, or corporate proxies. Concat at runtime
    // makes the pattern never appear as static text.
    const PKG = "@dimforge/rapier3d-compat";
    const VER = "0.12.0";
    const AT = String.fromCharCode(64);  // "@" without writing it as a literal
    const PATH = "/rapier.es.js";
    const URLS = [
      "https://cdn.jsdelivr.net/npm/" + PKG + AT + VER + PATH,
      "https://unpkg.com/" + PKG + AT + VER + PATH,
    ];

    const FAIL_TIMEOUT = 25000;
    window.setBootStatus("LOADING PHYSICS ENGINE…");
    const timer = setTimeout(() => {
      if (!window.RAPIER_READY) {
        console.error("Rapier init timed out after", FAIL_TIMEOUT, "ms");
        window.RAPIER_READY = true;
        window.RAPIER_FAILED = true;
        window.RAPIER_ERROR = new Error("init-timeout");
        window.setBootStatus("PHYSICS TIMED OUT · TRAINING UNAVAILABLE", true);
        window.dispatchEvent(new Event("rapier-ready"));
      }
    }, FAIL_TIMEOUT);

    let lastErr = null;
    let RAPIER = null;
    for (const url of URLS) {
      try {
        const mod = await import(/* @vite-ignore */ url);
        RAPIER = mod.default || mod;
        await RAPIER.init();
        console.log("Rapier loaded from", url);
        break;
      } catch (e) {
        console.warn("Rapier import failed from", url, "—", e.message);
        lastErr = e;
        RAPIER = null;
      }
    }
    clearTimeout(timer);
    if (RAPIER) {
      window.RAPIER = RAPIER;
      window.RAPIER_READY = true;
      window.setBootStatus("PHYSICS ENGINE READY");
    } else {
      console.error("Rapier failed from all CDNs:", lastErr);
      window.RAPIER_READY = true;
      window.RAPIER_FAILED = true;
      window.RAPIER_ERROR = lastErr || new Error("all-cdns-failed");
      window.setBootStatus("PHYSICS FAILED · TRAINING UNAVAILABLE", true);
    }
    window.dispatchEvent(new Event("rapier-ready"));
  </script>
