<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{

<script>
// ============================================================
// SEEDED PRNG — xorshift32
// ============================================================
function createRNG(seed) {
  let s = seed | 0 || 1;
  if (s === 0) s = 1;
  return function next() {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return (s >>> 0) / 0xffffffff;
  };
}

// ============================================================
// MAZE GENERATOR
// ============================================================
function generateMaze(cols, rows, seed) {
  const rand = createRNG(seed);
  const grid = Array.from({length:rows},()=>Array(cols).fill(1));
  const W = Math.floor((cols-1)/2), H = Math.floor((rows-1)/2);
  const visited = Array.from({length:H},()=>Array(W).fill(false));
  function cellTo(cx,cy){return[cx*2+1,cy*2+1]}
  function carve(cx,cy){
    visited[cy][cx]=true;
    const [gx,gy]=cellTo(cx,cy);grid[gy][gx]=0;
    const dirs=[[0,-1],[1,0],[0,1],[-1,0]];
    for(let i=dirs.length-1;i>0;i--){
      const j=Math.floor(rand()*(i+1));
      [dirs[i],dirs[j]]=[dirs[j],dirs[i]];
    }
    for(const [dx,dy] of dirs){
      const nx=cx+dx,ny=cy+dy;
      if(nx>=0&&ny>=0&&nx<W&&ny<H&&!visited[ny][nx]){
        const[gx1,gy1]=cellTo(cx,cy),[gx2,gy2]=cellTo(nx,ny);
        grid[(gy1+gy2)/2][(gx1+gx2)/2]=0;
        carve(nx,ny);
      }
    }
  }
  carve(0,0);
  return {grid,cols,rows,start:[1,1],exit:[cols-2,rows-2]};
}

// ============================================================
// NEURAL NETWORK — 8→8→4, tanh, ~100 weights
// ============================================================
const BRAIN_ARCH = {inputs:8,hidden:8,outputs:4};

function makeBrain(arch) {
  if (!arch) arch = BRAIN_ARCH;
  const {inputs,hidden,outputs} = arch;
  return {
    arch:{...arch,activation:'tanh'},
    w1:Array.from({length:hidden},()=>Array.from({length:inputs},()=>Math.random()*2-1)),
    b1:Array.from({length:hidden},()=>Math.random()*0.2-0.1),
    w2:Array.from({length:outputs},()=>Array.from({length:hidden},()=>Math.random()*2-1)),
    b2:Array.from({length:outputs},()=>Math.random()*0.2-0.1),
  };
}

function cloneBrain(b) {
  return {
    arch:{...b.arch},
    w1:b.w1.map(r=>r.slice()),
    b1:b.b1.slice(),
    w2:b.w2.map(r=>r.slice()),
    b2:b.b2.slice(),
  };
}

function forward(b, x) {
  const {hidden,outputs} = b.arch;
  const h = new Array(hidden);
  for (let i = 0; i < hidden; i++) {
    let s = b.b1[i];
    const row = b.w1[i];
    for (let j = 0; j < b.arch.inputs; j++) s += row[j] * x[j];
    h[i] = Math.tanh(s);
  }
  const y = new Array(outputs);
  for (let i = 0; i < outputs; i++) {
    let s = b.b2[i];
    const row = b.w2[i];
    for (let j = 0; j < hidden; j++) s += row[j] * h[j];
    y[i] = Math.tanh(s);
  }
  return y;
}

function mutate(b, rate, sigma) {
  if (!rate) rate = 0.08;
  if (!sigma) sigma = 0.3;
  const c = cloneBrain(b);
  const m = v => (Math.random() < rate ? v + (Math.random()*2-1)*sigma : v);
  c.w1 = c.w1.map(r=>r.map(m));
  c.b1 = c.b1.map(m);
  c.w2 = c.w2.map(r=>r.map(m));
  c.b2 = c.b2.map(m);
  return c;
}

function brainToJSON(b, meta) {
  return {
    schema:'brainwork-royale.brain.v2',
    arch:b.arch,
    weights:{w1:b.w1,b1:b.b1,w2:b.w2,b2:b.b2},
    meta:{...meta,exportedAt:Date.now()},
  };
}

function brainFromJSON(j) {
  return {
    arch:j.arch,
    w1:j.weights.w1,b1:j.weights.b1,
    w2:j.weights.w2,b2:j.weights.b2,
  };
}

// ============================================================
// AGENT — brain-driven (replaces scripted wall-follower)
// ============================================================
function createAgent(maze, brain) {
  const [sx,sy] = maze.start;
  return {
    x:sx+0.5,y:sy+0.5,prevX:sx+0.5,prevY:sy+0.5,
    dir:0,                     // radians
    speed:0.13,                // cells per tick
    turnRate:1.2,              // max radians per tick
    alive:true,reached:false,
    brain:brain || null,       // null = random movement (untrained)
    memory:[],                 // ring buffer of recent positions
    memorySize:24,
    stuckTimer:0,              // ticks since last meaningful move
    lastMoveTick:0,
  };
}

// ============================================================
// OBSERVE — build the 8-element input vector
// ============================================================
function observe(maze, agent) {
  const {grid,cols,rows,exit} = maze;
  const [ex,ey] = exit;

  // Distance to walls in 4 cardinal directions (normalized by maze size)
  function wallDist(cx,cy,dx,dy,mx) {
    for(let d=0;d<mx;d++){
      const tx=Math.floor(cx)+dx*d,ty=Math.floor(cy)+dy*d;
      if(tx<0||ty<0||tx>=cols||ty>=rows)return d/mx;
      if(grid[ty][tx]===1)return d/mx;
    }
    return 1;
  }
  const maxDist = Math.max(cols,rows);
  const dN = wallDist(agent.x,agent.y,0,-1,maxDist);
  const dS = wallDist(agent.x,agent.y,0,1,maxDist);
  const dE = wallDist(agent.x,agent.y,1,0,maxDist);
  const dW = wallDist(agent.x,agent.y,-1,0,maxDist);

  // Distance to exit (normalized)
  const dxEx = exit[0] - agent.x, dyEx = exit[1] - agent.y;
  const distExit = Math.hypot(dxEx,dyEx) / Math.hypot(cols,rows);

  // Agent speed (normalized)
  const speedNorm = agent.speed * 5; // ~0.65

  // Time since last meaningful move (normalized)
  const stuckNorm = Math.min(1, agent.stuckTimer / 100);

  // Memory cell recency — how recently was the current cell visited?
  const cx = Math.floor(agent.x), cy = Math.floor(agent.y);
  let recency = 1; // never visited
  const memLen = agent.memory.length;
  if (memLen > 0) {
    for (let i = memLen - 1; i >= 0; i--) {
      const [mx,my] = agent.memory[i];
      if (Math.floor(mx) === cx && Math.floor(my) === cy) {
        recency = 1 - (memLen - i) / memLen; // 0 = just visited, 1 = old
        break;
      }
    }
  }

  return [dN,dS,dE,dW,distExit,speedNorm,stuckNorm,recency];
}

// ============================================================
// TICK — brain-driven (pure function)
// ============================================================
function tick(maze, agent, rng) {
  if (!agent.alive || agent.reached) return agent;

  const a = {...agent,memory:[...agent.memory]};
  a.prevX = a.x; a.prevY = a.y;

  const {grid,cols,rows,exit} = maze;
  const [ex,ey] = exit;

  // Check exit
  const cx = Math.floor(a.x), cy = Math.floor(a.y);
  if (cx === ex && cy === ey) {
    a.x = ex + 0.5; a.y = ey + 0.5;
    a.reached = true;
    return a;
  }

  // Memory
  a.memory.push([a.x,a.y]);
  if (a.memory.length > a.memorySize) a.memory.shift();

  // Observe
  const obs = observe(maze, a);

  // Decide: brain-driven or random
  let turn = 0, move = 0;
  if (a.brain) {
    const out = forward(a.brain, obs);
    // Outputs: 0=left, 1=right, 2=forward, 3=stay
    // Softmax-like: use tanh output range [-1,1], map to probabilities
    turn = out[1] - out[0];  // right - left bias
    move = out[2] - out[3];  // forward - stay bias
    a._lastOutput = out;
  } else {
    // Random movement (for untrained/initial brains)
    turn = (rng() - 0.5) * 2;
    move = rng() * 0.5 + 0.3; // bias toward moving
    a._lastOutput = [0,0,0,0];
  }
  a._lastObs = obs;

  // Apply turn
  a.dir += Math.max(-a.turnRate, Math.min(a.turnRate, turn * a.turnRate * 0.8));

  // Apply move
  if (move > 0) {
    const step = a.speed * Math.max(0.1, move);
    a.x += Math.cos(a.dir) * step;
    a.y += Math.sin(a.dir) * step;
    a.lastMoveTick = 0; // used by caller to track inactivity
  } else {
    a.stuckTimer++;
  }

  // Collision
  const ncx = Math.floor(a.x), ncy = Math.floor(a.y);
  if (ncx < 0 || ncy < 0 || ncx >= cols || ncy >= rows || grid[ncy][ncx] === 1) {
    a.x = a.prevX; a.y = a.prevY;
    a.stuckTimer++;
  } else {
    a.stuckTimer = 0;
  }

  return a;
}

// ============================================================
// FITNESS FUNCTION
// ============================================================
function evaluateFitness(maze, brain, maxTicks, seedOffset) {
  const rng = createRNG((maze._seed || 0) + (seedOffset || 0));
  let agent = createAgent(maze, brain);
  let ticks = 0;
  let lastDist = Math.hypot(maze.exit[0]-agent.x, maze.exit[1]-agent.y);
  let revisitPenalty = 0;
  const visitedCells = {};

  while (ticks < maxTicks && !agent.reached) {
    agent = tick(maze, agent, rng);
    ticks++;

    // Revisit penalty
    const cx = Math.floor(agent.x), cy = Math.floor(agent.y);
    const key = `${cx},${cy}`;
    visitedCells[key] = (visitedCells[key] || 0) + 1;
    if (visitedCells[key] > 3) revisitPenalty += 0.01;

    // Stuck detection: if stuck for >150 ticks, terminate
    if (agent.stuckTimer > 150) break;
  }

  const dist = Math.hypot(maze.exit[0]-agent.x, maze.exit[1]-agent.y);
  const progress = 1 - (dist / (lastDist || 1));
  const timeBonus = agent.reached ? Math.max(0, (maxTicks - ticks) / maxTicks * 5) : 0;
  const aliveBonus = agent.reached ? 3 : 0;

  return progress + timeBonus + aliveBonus - revisitPenalty;
}

// ============================================================
// GENETIC ALGORITHM
// ============================================================
const POP_SIZE = 50;
const ELITE_COUNT = 5;
const MAX_TICKS = 1500;

function runGeneration(maze, population, gen) {
  // Evaluate
  for (const p of population) {
    p.fitness = evaluateFitness(maze, p.brain, MAX_TICKS, gen * POP_SIZE + p.id);
  }

  // Sort
  population.sort((a,b) => b.fitness - a.fitness);

  const best = population[0];
  const avg = population.reduce((s,p)=>s+p.fitness,0)/population.length;

  // Breed
  const elites = population.slice(0, ELITE_COUNT).map(p=>({
    id:p.id,brain:cloneBrain(p.brain),fitness:0
  }));
  const next = [...elites];

  const parentPool = population.slice(0, Math.min(8, population.length));
  for (let i = elites.length; i < POP_SIZE; i++) {
    const parent = parentPool[Math.floor(Math.random()*parentPool.length)].brain;
    next.push({
      id: i,
      brain: mutate(parent, 0.08, 0.3),
      fitness: 0,
    });
  }

  return {
    population: next,
    bestFitness: best.fitness,
    avgFitness: avg,
    bestBrain: cloneBrain(best.brain),
  };
}

// ============================================================
// QUESTION BANK — same 50 questions
// ============================================================
const QUESTION_BANK = [
  {q:"What is 7 × 8?",opts:["54","56","64","48"],correct:1,cat:"Math"},
  {q:"What is 15% of 200?",opts:["25","30","35","40"],correct:1,cat:"Math"},
  {q:"√144 = ?",opts:["10","11","12","14"],correct:2,cat:"Math"},
  {q:"What is 2⁸?",opts:["128","256","512","64"],correct:1,cat:"Math"},
  {q:"What is 3³ + 4²?",opts:["43","31","25","37"],correct:0,cat:"Math"},
  {q:"If x + 7 = 15, x = ?",opts:["6","7","8","9"],correct:2,cat:"Math"},
  {q:"Area of circle with r=5? (π≈3.14)",opts:["62.8","78.5","31.4","15.7"],correct:1,cat:"Math"},
  {q:"LCM of 6 and 8?",opts:["12","24","48","16"],correct:1,cat:"Math"},

  {q:"What is 1/3 + 1/4?",opts:["2/7","7/12","1/7","5/12"],correct:1,cat:"Math"},
  {q:"Square root of 169?",opts:["11","12","13","14"],correct:2,cat:"Math"},
  {q:"If a=3, b=4, a²+b²=?",opts:["25","7","12","49"],correct:0,cat:"Math"},
  {q:"WW2 ended in?",opts:["1943","1944","1945","1946"],correct:2,cat:"History"},
  {q:"First US President?",opts:["Jefferson","Adams","Washington","Lincoln"],correct:2,cat:"History"},
  {q:"Berlin Wall fell in:",opts:["1987","1988","1989","1990"],correct:2,cat:"History"},
  {q:"Which empire built the Colosseum?",opts:["Greek","Roman","Persian","Ottoman"],correct:1,cat:"History"},
  {q:"Who discovered penicillin?",opts:["Pasteur","Fleming","Koch","Jenner"],correct:1,cat:"History"},
  {q:"French Revolution began:",opts:["1776","1789","1799","1804"],correct:1,cat:"History"},
  {q:"Who wrote 'The Art of War'?",opts:["Confucius","Sun Tzu","Lao Tzu","Mencius"],correct:1,cat:"History"},
  {q:"Ship that sank in 1912?",opts:["Lusitania","Britannic","Titanic","Olympic"],correct:2,cat:"History"},

function pickQuestions(n) {
  const pool = [...QUESTION_BANK];
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  return pool.slice(0,n);
}

// ============================================================
// CANVAS RENDERER
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const r = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = r.width * dpr; canvas.height = r.height * dpr;
  canvas.style.width = r.width + 'px'; canvas.style.height = r.height + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function render(maze, agent, runState) {
  const {grid,cols,rows,exit} = maze;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const cellW = w/cols, cellH = h/rows;
  ctx.clearRect(0,0,w,h);

  ctx.fillStyle = '#050810';
  ctx.fillRect(0,0,w,h);

  // Walls
  ctx.fillStyle = '#1c2138';
  for(let y=0;y<rows;y++)
    for(let x=0;x<cols;x++)
      if(grid[y][x]===1)
        ctx.fillRect(x*cellW+1,y*cellH+1,cellW-2,cellH-2);

  // Exit
  const [ex,ey] = exit;
  ctx.fillStyle = '#5df2d6';
  ctx.globalAlpha = 0.5 + Math.sin(performance.now()*0.005)*0.3;
  ctx.fillRect(ex*cellW+2,ey*cellH+2,cellW-4,cellH-4);
  ctx.globalAlpha = 1;

  // Memory trail
  if(agent.memory.length>1){
    ctx.strokeStyle='rgba(93,242,214,0.12)';ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<agent.memory.length;i++){
      const[mx,my]=agent.memory[i];
      const px=mx*cellW,py=my*cellH;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }

  // Agent
  const px=agent.x*cellW,py=agent.y*cellH;
  const size=cellW*0.4;
  ctx.save();ctx.translate(px,py);ctx.rotate(agent.dir);
  ctx.fillStyle=agent.reached?'#ffb84d':'#5df2d6';
  ctx.beginPath();
  ctx.moveTo(size,0);ctx.lineTo(-size*.6,-size*.5);ctx.lineTo(-size*.6,size*.5);
  ctx.closePath();ctx.fill();
  ctx.restore();

  // Stuck indicator
  if(agent.stuckTimer>80){
    ctx.strokeStyle='rgba(255,77,157,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px,py,size*1.5,0,Math.PI*2);ctx.stroke();
  }
}

// ============================================================
// RUN LOOP
// ============================================================
const TICK_RATE = 30;
const TICK_MS = 1000 / TICK_RATE;

let runState = {
  status:'idle',tickCount:0,speed:1,
  agent:null,maze:null,
  ticksThisFrame:0,
};

function startRun(brain) {
  runState.status = 'running';
  runState.speed = 2;
  runState.tickCount = 0;
  runState.agent = createAgent(runState.maze, brain || gameState.bestBrain);
  document.getElementById('result').style.display = 'none';
  updateUI();
}

function spawnParticles(x,y,count){
  const wrap=document.getElementById('canvasWrap');
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    const angle=Math.random()*Math.PI*2,dist=20+Math.random()*40;
    p.style.cssText=`left:${x}px;top:${y}px;background:${i%2===0?'#5df2d6':'#ffb84d'};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px`;
    wrap.appendChild(p);setTimeout(()=>p.remove(),700);
  }
}

// ============================================================
// GAME STATE
// ============================================================
let gameState = {
  mazeSeed: Date.now(),
  trainingTokens: 3,
  bestBrain: null,
  currentBrain: null,
  population: null,
  bestFitness: 0,
  totalGens: 0,
  fitnessHistory: [],
  lineage: [],
};

function initPopulation() {
  gameState.population = Array.from({length:POP_SIZE},(_,i)=>({
    id:i,brain:makeBrain(),fitness:0,
  }));
  gameState.totalGens = 0;
  gameState.fitnessHistory = [];
  gameState.bestFitness = 0;
  gameState.bestBrain = null;
  gameState.lineage = [];
}

function newMaze() {
  gameState.mazeSeed = Date.now();
  runState.status = 'idle';
  runState.tickCount = 0;
  runState.maze = generateMaze(21, 21, gameState.mazeSeed);
  runState.maze._seed = gameState.mazeSeed;
  runState.agent = createAgent(runState.maze, gameState.bestBrain);
  initPopulation();
  resetQuiz();
  updateUI();
  drawFitnessChart();
}

// ============================================================
// TRAINING
// ============================================================
async function trainGenerations(count) {
  if (runState.status === 'running') return;

  for (let g = 0; g < count; g++) {
    if (gameState.trainingTokens <= 0) break;
    gameState.trainingTokens--;

    const result = await runOneGen();
    gameState.population = result.population;
    gameState.bestFitness = result.bestFitness;
    gameState.totalGens++;
    gameState.fitnessHistory.push(result.bestFitness);
    if (gameState.fitnessHistory.length > 100) gameState.fitnessHistory.shift();

    if (!gameState.bestBrain || result.bestFitness > (gameState._prevBest || 0)) {
      gameState.bestBrain = cloneBrain(result.bestBrain);
      gameState._prevBest = result.bestFitness;
      gameState.lineage.push({gen:gameState.totalGens,fitness:result.bestFitness});
    }

    updateUI();
    drawFitnessChart();

    // Mini-viewer: show the best brain running during training
    runState.agent = createAgent(runState.maze, gameState.bestBrain);
    runState.agent.reached = false;
    runState.agent.alive = true;

    // Run a quick visual burst
    const rng = createRNG(gameState.mazeSeed + gameState.totalGens);
    for (let t = 0; t < 40; t++) {
      runState.agent = tick(runState.maze, runState.agent, rng);
      if (runState.agent.reached) break;
    }

    await new Promise(r => setTimeout(r, 20));
  }

  document.getElementById('trainProgress').textContent = 'ready';
  updateUI();
}

function runOneGen() {
  return new Promise(resolve => {
    // Use setTimeout to yield to UI between batches
    setTimeout(() => {
      const result = runGeneration(runState.maze, gameState.population, gameState.totalGens);
      resolve(result);
    }, 0);
  });
}

// ============================================================
// QUIZ
// ============================================================
let currentQuiz = [], quizIndex = 0, quizScore = 0;

function resetQuiz() {
  quizIndex = 0; quizScore = 0;
  currentQuiz = pickQuestions(5);
  renderQuiz();
}

function renderQuiz() {
  const el = document.getElementById('quizContent');
  if (quizIndex >= currentQuiz.length) {
    el.innerHTML = `<div class="quiz-feedback" style="color:#5df2d6">Quiz done! +${quizScore} tokens earned.</div>
      <button class="btn btn--sm" style="margin-top:8px" onclick="newQuiz()">New quiz</button>`;
    return;
  }
  const q = currentQuiz[quizIndex];
  el.innerHTML = `
    <div class="quiz-q">${q.q} <span style="font-size:10px;color:#5a608a">[${q.cat}]</span></div>
    <div class="quiz-opts">
      ${q.opts.map((o,i)=>`<button class="quiz-opt" data-idx="${i}">${String.fromCharCode(65+i)}) ${o}</button>`).join('')}
    </div>
    <div class="quiz-feedback" id="quizFeedback"></div>
  `;
  el.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.idx);
      const correct=idx===currentQuiz[quizIndex].correct;
      const fb=document.getElementById('quizFeedback');
      el.querySelectorAll('.quiz-opt').forEach(b=>{
        b.disabled=true;
        const i=parseInt(b.dataset.idx);
        if(i===currentQuiz[quizIndex].correct)b.classList.add('correct');
        else if(i===idx&&!correct)b.classList.add('wrong');
      });
      if(correct){quizScore++;gameState.trainingTokens++;}
      fb.textContent=correct?'Correct! +1 token':'Incorrect — answer highlighted.';
      fb.style.color=correct?'#5df2d6':'#ff4d9d';
      setTimeout(()=>{quizIndex++;renderQuiz();updateUI();},800);
    });
  });
}

function newQuiz(){quizIndex=0;quizScore=0;currentQuiz=pickQuestions(5);renderQuiz()}

// ============================================================
// FITNESS CHART
// ============================================================
function drawFitnessChart() {
  const c = document.getElementById('fitnessChart');
  const dpr = window.devicePixelRatio||1;
  const w = c.clientWidth, h = c.clientHeight;
  if (c.width !== w*dpr) { c.width = w*dpr; c.height = h*dpr; }
  const ctx = c.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);

  const hist = gameState.fitnessHistory;
  if (hist.length < 2) return;
  const lo = Math.min(...hist, 0), hi = Math.max(...hist, lo+0.1);
  const span = hi-lo;

  // Fill
  ctx.fillStyle = 'rgba(93,242,214,0.1)';
  ctx.beginPath();
  hist.forEach((v,i)=>{
    const x=(i/Math.max(1,hist.length-1))*w;
    const y=h-((v-lo)/span)*h;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();

  // Line
  ctx.strokeStyle='#5df2d6';ctx.lineWidth=1.5;
  ctx.beginPath();
  hist.forEach((v,i)=>{
    const x=(i/Math.max(1,hist.length-1))*w;
    const y=h-((v-lo)/span)*h;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
}

// ============================================================
// BRAIN OVERLAY
// ============================================================
function updateBrainOverlay(agent) {
  const el = document.getElementById('brainOverlay');
  const inp = document.getElementById('overlayInputs');
  const out = document.getElementById('overlayOutputs');

  if (!agent._lastObs || agent._lastObs.length < 8) {
    el.style.display = 'none'; return;
  }
  el.style.display = 'block';

  const labels = ['N','S','E','W','EXIT','SPD','STK','REC'];
  inp.innerHTML = 'IN: ' + agent._lastObs.map((v,i)=>
    `<span style="color:${Math.abs(v)>0.5?'#5df2d6':'#5a608a'}">${labels[i]}:${v.toFixed(1)}</span>`
  ).join(' ');

  const outLabels = ['←','→','↑','✕'];
  out.innerHTML = 'OUT: ' + (agent._lastOutput||[0,0,0,0]).map((v,i)=>{
    const pct = ((v+1)/2*100).toFixed(0);
    return `<span style="color:${pct>60?'#5df2d6':pct>30?'#ffb84d':'#5a608a'}">${outLabels[i]}:${pct}%</span>`;
  }).join(' ');
}

// ============================================================
// UI UPDATE
// ============================================================
function updateUI() {
  document.getElementById('hudState').textContent =
    runState.status==='running'?'RUNNING':
    runState.agent?.reached?'DONE!':'READY';
  document.getElementById('hudInfo').textContent =

  document.getElementById('tokenCount').textContent = gameState.trainingTokens;
  document.getElementById('lineageInfo').textContent =
    `gen ${gameState.totalGens} · best ${gameState.bestFitness.toFixed(2)}`;

  const genBar = document.getElementById('genBar');
  genBar.style.width = Math.min(100, gameState.totalGens * 2) + '%';

  document.getElementById('brainInfo').innerHTML = `
    Architecture: ${BRAIN_ARCH.inputs}→${BRAIN_ARCH.hidden}→${BRAIN_ARCH.outputs}<br/>
    Weights: ~${BRAIN_ARCH.inputs*BRAIN_ARCH.hidden+BRAIN_ARCH.hidden+BRAIN_ARCH.hidden*BRAIN_ARCH.outputs+BRAIN_ARCH.outputs}<br/>
    Best fitness: ${gameState.bestFitness.toFixed(3)}<br/>
    Total generations: ${gameState.totalGens}<br/>
  `;

  document.getElementById('replayBtn').disabled = !gameState.bestBrain;

  updateBrainOverlay(runState.agent);
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTickTime = 0, tickAccumulator = 0;
let runRng = null;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  if (runState.status === 'running') {
    if (lastTickTime === 0) lastTickTime = timestamp;
    const elapsed = timestamp - lastTickTime;
    lastTickTime = timestamp;
    tickAccumulator += elapsed * runState.speed;

    if (!runRng) runRng = createRNG(gameState.mazeSeed + runState.tickCount);

    while (tickAccumulator >= TICK_MS) {
      tickAccumulator -= TICK_MS;
      runState.agent = tick(runState.maze, runState.agent, runRng);
      runState.tickCount++;

      if (runState.agent.reached) {
        runState.status = 'done';
        const wrap = document.getElementById('canvasWrap');
        const cellW = wrap.clientWidth/runState.maze.cols;
        const cellH = wrap.clientHeight/runState.maze.rows;
        spawnParticles(runState.agent.x*cellW, runState.agent.y*cellH, 20);
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').innerHTML =
          `<div class="result__status">MAZE COMPLETE!</div>
           <div class="result__time">${(runState.tickCount/TICK_RATE).toFixed(1)}s · ${runState.tickCount} ticks</div>`;
        updateUI(); break;
      }

      if (runState.tickCount >= 3000) {
        runState.status = 'done';
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').innerHTML =
          `<div class="result__status" style="color:#ff4d9d">TIMED OUT</div>
           <div class="result__time">${(runState.tickCount/TICK_RATE).toFixed(0)}s elapsed.
            <br/><span style="font-size:11px;color:#8b91b8">Train more generations to improve.</span></div>`;
        updateUI(); break;
      }

      updateUI();
    }
    runRng = null; // fresh RNG each frame
  } else {
    lastTickTime = 0; tickAccumulator = 0;
  }

  if (runState.maze && runState.agent) {
    render(runState.maze, runState.agent, runState);
  }
}

newMaze();
